name: TASK006-FIX-SEASONS-TYPES1 - Fix multi seasons/types in RecipeCard and recipe detail page

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  task:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Replace components/RecipeCard.vue (only seasons/types rendering + remove debug)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p components

          cat > components/RecipeCard.vue <<'EOF'
          <template>
            <NuxtLink
              :to="`/recipes/${recipe.id}`"
              class="group block rounded-2xl border border-gray-100 bg-white overflow-hidden hover:shadow-sm transition"
            >
              <div class="aspect-[4/3] bg-gray-100 overflow-hidden">
                <img
                  v-if="recipe.main_image_url"
                  :src="recipe.main_image_url"
                  alt=""
                  class="w-full h-full object-cover group-hover:scale-[1.02] transition"
                  loading="lazy"
                />
                <div v-else class="w-full h-full flex items-center justify-center text-sm text-gray-500">
                  Без зображення
                </div>
              </div>

              <div class="p-4 space-y-2">
                <div class="font-semibold leading-snug line-clamp-2">
                  {{ recipe.title }}
                </div>

                <div class="text-xs text-gray-600 space-y-1">
                  <div class="flex flex-wrap items-center gap-x-2 gap-y-1">
                    <span>Автор: {{ authorLabel }}</span>
                    <span v-if="cookTime">• {{ cookTime }}</span>
                  </div>

                  <div class="flex flex-wrap items-center gap-x-2 gap-y-1">
                    <span v-if="seasonText">Сезон: {{ seasonText }}</span>
                    <span v-if="seasonText && dishTypeText">•</span>
                    <span v-if="dishTypeText">Тип: {{ dishTypeText }}</span>
                  </div>
                </div>
              </div>
            </NuxtLink>
          </template>

          <script setup lang="ts">
          const SEASON_LABEL: Record<string, string> = {
            winter: 'Зима',
            spring: 'Весна',
            summer: 'Літо',
            autumn: 'Осінь'
          }

          const DISH_LABEL: Record<string, string> = {
            breakfast: 'Сніданок',
            lunch: 'Обід',
            dinner: 'Вечеря',
            dessert: 'Десерт'
          }

          // Simple author cache to avoid repeated per-card requests
          const authorCache =
            (globalThis as any).__authorCache || ((globalThis as any).__authorCache = new Map<string, string>())

          type SeasonRel = { season?: string | null } | string
          type DishRel = { dish_type?: string | null } | string

          type Recipe = {
            id: string
            title: string
            main_image_url?: string | null
            cook_time_minutes?: number | null
            author_name?: string | null
            author_id?: string | null

            // relations
            recipe_seasons?: SeasonRel[]
            recipe_dish_types?: DishRel[]

            // backward-compat (old single season)
            season?: string | null
          }

          const props = defineProps<{ recipe: Recipe }>()
          const client = useSupabaseClient()

          const cookTime = computed(() => {
            const n = props.recipe.cook_time_minutes
            return n ? `${n} хв` : ''
          })

          const seasons = computed<string[]>(() => {
            const rel = props.recipe.recipe_seasons ?? []
            const values = rel
              .map((x: any) => (typeof x === 'string' ? x : x?.season))
              .filter((v: any) => typeof v === 'string' && v.length > 0) as string[]

            if (values.length) return Array.from(new Set(values))

            // fallback: old single season
            const s = props.recipe.season
            return s ? [s] : []
          })

          const dishTypes = computed<string[]>(() => {
            const rel = props.recipe.recipe_dish_types ?? []
            const values = rel
              .map((x: any) => (typeof x === 'string' ? x : x?.dish_type))
              .filter((v: any) => typeof v === 'string' && v.length > 0) as string[]

            return Array.from(new Set(values))
          })

          const seasonText = computed(() => seasons.value.map((s) => SEASON_LABEL[s] || s).join(', '))
          const dishTypeText = computed(() => dishTypes.value.map((t) => DISH_LABEL[t] || t).join(', '))

          const authorLabel = ref<string>('Автор')

          const loadAuthor = async () => {
            const direct = props.recipe.author_name
            if (direct) {
              authorLabel.value = direct
              return
            }

            const id = props.recipe.author_id
            if (!id) return

            const cached = authorCache.get(id)
            if (cached) {
              authorLabel.value = cached
              return
            }

            const { data } = await client.from('profiles').select('display_name').eq('id', id).maybeSingle()
            const name = data?.display_name || 'Автор'
            authorCache.set(id, name)
            authorLabel.value = name
          }

          onMounted(loadAuthor)
          watch(() => props.recipe.author_id, loadAuthor)
          </script>
          EOF

      - name: Replace recipe detail page (add seasons/types select + display only)
        shell: bash
        run: |
          set -euo pipefail

          # Detect which recipe detail file exists in repo
          TARGET=""
          if [ -f "pages/recipes/[id].index.vue" ]; then
            TARGET="pages/recipes/[id].index.vue"
          elif [ -f "pages/recipes/[id]/index.vue" ]; then
            TARGET="pages/recipes/[id]/index.vue"
          elif [ -f "pages/recipes/[id].vue" ]; then
            TARGET="pages/recipes/[id].vue"
          else
            echo "No recipe detail page found (expected one of: pages/recipes/[id].index.vue, pages/recipes/[id]/index.vue, pages/recipes/[id].vue)"
            exit 1
          fi

          echo "Patching recipe detail page: $TARGET"

          cat > "$TARGET" <<'EOF'
          <template>
            <div v-if="loading" class="text-sm text-gray-600">Завантаження…</div>

            <div v-else-if="!recipe" class="text-sm text-gray-600">
              Рецепт не знайдено.
            </div>

            <div v-else class="space-y-6">
              <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <!-- Left: image + servings + ingredients -->
                <div class="space-y-4">
                  <div class="rounded-3xl overflow-hidden bg-gray-100 aspect-[4/3]">
                    <img
                      v-if="recipe.main_image_url"
                      :src="recipe.main_image_url"
                      alt=""
                      class="w-full h-full object-cover"
                    />
                    <div v-else class="w-full h-full flex items-center justify-center text-sm text-gray-500">
                      Без зображення
                    </div>
                  </div>

                  <div class="border border-gray-100 rounded-2xl p-4 space-y-3">
                    <div class="flex items-center justify-between">
                      <div class="text-sm font-semibold">Порції</div>
                      <div class="flex items-center gap-2">
                        <button
                          type="button"
                          class="w-9 h-9 rounded-full border border-gray-300 hover:bg-gray-50"
                          @click="decServings"
                          aria-label="Decrease servings"
                        >
                          –
                        </button>
                        <div class="min-w-[2.5rem] text-center text-sm font-semibold">
                          {{ servings }}
                        </div>
                        <button
                          type="button"
                          class="w-9 h-9 rounded-full border border-gray-300 hover:bg-gray-50"
                          @click="incServings"
                          aria-label="Increase servings"
                        >
                          +
                        </button>
                      </div>
                    </div>

                    <div class="text-xs text-gray-600">
                      Базові порції: {{ baseServings }}
                    </div>
                  </div>

                  <div class="border border-gray-100 rounded-2xl p-4">
                    <div class="font-semibold mb-3">Інгредієнти</div>
                    <ul class="space-y-2">
                      <li
                        v-for="ing in scaledIngredients"
                        :key="ing.id"
                        class="flex items-baseline justify-between gap-4"
                      >
                        <div class="text-sm text-gray-900">
                          {{ ing.name }}
                        </div>
                        <div class="text-sm text-gray-700 whitespace-nowrap">
                          {{ formatQty(ing.scaled_quantity) }} {{ ing.unit }}
                        </div>
                      </li>
                    </ul>
                  </div>
                </div>

                <!-- Right: title + meta + description + steps -->
                <div class="space-y-4">
                  <div class="space-y-1">
                    <h1 class="text-2xl font-semibold">{{ recipe.title }}</h1>

                    <div class="text-xs text-gray-600 flex flex-wrap gap-x-3 gap-y-1">
                      <div>Автор: {{ recipe.author_name || '—' }}</div>

                      <div v-if="seasonText">Сезон: {{ seasonText }}</div>
                      <div v-if="dishTypeText">Тип: {{ dishTypeText }}</div>

                      <div v-if="recipe.cook_time_minutes">Час: {{ recipe.cook_time_minutes }} хв</div>
                      <div>Статус: {{ recipe.is_public ? 'публічний' : 'приватний' }}</div>
                    </div>
                  </div>

                  <div v-if="recipe.description" class="border border-gray-100 rounded-2xl p-4">
                    <div class="font-semibold mb-2">Опис</div>
                    <p class="text-sm text-gray-800 whitespace-pre-wrap">{{ recipe.description }}</p>
                  </div>

                  <div class="border border-gray-100 rounded-2xl p-4 space-y-4">
                    <div class="font-semibold">Кроки</div>

                    <div v-for="st in sortedSteps" :key="st.id" class="space-y-2">
                      <div class="text-sm font-semibold text-gray-800">
                        Крок {{ st.step_number }}
                      </div>
                      <p class="text-sm text-gray-800 whitespace-pre-wrap">{{ st.text }}</p>

                      <div v-if="st.image_url" class="rounded-2xl overflow-hidden bg-gray-100 aspect-[4/3]">
                        <img :src="st.image_url" alt="" class="w-full h-full object-cover" loading="lazy" />
                      </div>
                    </div>
                  </div>

                  <div class="flex items-center gap-2">
                    <button
                      v-if="canSave"
                      class="rounded-full border border-gray-300 px-4 py-2 text-sm hover:bg-gray-50"
                      @click="onSave"
                      type="button"
                    >
                      Зберегти в папці "Збережені рецепти"
                    </button>

                    <button
                      v-if="isAuthor"
                      class="rounded-full border border-gray-300 px-4 py-2 text-sm hover:bg-gray-50"
                      @click="router.push(`/recipes/${recipe.id}/edit`)"
                      type="button"
                    >
                      Редагувати
                    </button>
                  </div>

                  <div v-if="message" class="text-sm text-gray-700">
                    {{ message }}
                  </div>
                </div>
              </div>
            </div>
          </template>

          <script setup lang="ts">
          const SEASON_LABEL: Record<string, string> = {
            winter: 'Зима',
            spring: 'Весна',
            summer: 'Літо',
            autumn: 'Осінь'
          }

          const DISH_LABEL: Record<string, string> = {
            breakfast: 'Сніданок',
            lunch: 'Обід',
            dinner: 'Вечеря',
            dessert: 'Десерт'
          }

          const route = useRoute()
          const router = useRouter()
          const client = useSupabaseClient()
          const user = useSupabaseUser()

          const id = route.params.id as string

          const loading = ref(true)
          const recipe = ref<any | null>(null)

          const servings = ref<number>(2)
          const message = ref<string>('')

          const baseServings = computed(() => Number(recipe.value?.servings || 1))

          const factor = computed(() => {
            const base = baseServings.value || 1
            return servings.value / base
          })

          const sortedSteps = computed(() => {
            const arr = (recipe.value?.recipe_steps || []) as any[]
            return [...arr].sort((a, b) => (a.step_number ?? 0) - (b.step_number ?? 0))
          })

          const scaledIngredients = computed(() => {
            const arr = (recipe.value?.recipe_ingredients || []) as any[]
            const ordered = [...arr].sort((a, b) => (a.order_index ?? 0) - (b.order_index ?? 0))
            return ordered.map((x) => ({
              id: x.id,
              name: x.name,
              unit: x.unit || '',
              scaled_quantity: Number(x.quantity) * factor.value
            }))
          })

          const seasons = computed<string[]>(() => {
            const rel = recipe.value?.recipe_seasons ?? []
            const values = rel
              .map((x: any) => (typeof x === 'string' ? x : x?.season))
              .filter((v: any) => typeof v === 'string' && v.length > 0) as string[]

            if (values.length) return Array.from(new Set(values))

            // fallback: old single season
            const s = recipe.value?.season
            return s ? [s] : []
          })

          const dishTypes = computed<string[]>(() => {
            const rel = recipe.value?.recipe_dish_types ?? []
            const values = rel
              .map((x: any) => (typeof x === 'string' ? x : x?.dish_type))
              .filter((v: any) => typeof v === 'string' && v.length > 0) as string[]

            return Array.from(new Set(values))
          })

          const seasonText = computed(() => seasons.value.map((s) => SEASON_LABEL[s] || s).join(', '))
          const dishTypeText = computed(() => dishTypes.value.map((t) => DISH_LABEL[t] || t).join(', '))

          const formatQty = (n: number) => {
            const fixed = n.toFixed(2)
            return fixed.replace(/\.?0+$/, '')
          }

          const incServings = () => {
            if (servings.value < 50) servings.value += 1
          }
          const decServings = () => {
            if (servings.value > 1) servings.value -= 1
          }

          const isAuthor = computed(() => {
            return !!user.value && recipe.value?.author_id === user.value.id
          })

          const canSave = computed(() => {
            return !!user.value && !isAuthor.value
          })

          const load = async () => {
            loading.value = true
            try {
              const { data, error } = await client
                .from('recipes')
                .select(`
                  id, title, description, main_image_url, cook_time_minutes, servings, season, is_public, author_id, created_at,
                  recipe_ingredients(*),
                  recipe_steps(*),
                  recipe_seasons(season),
                  recipe_dish_types(dish_type)
                `)
                .eq('id', id)
                .maybeSingle()

              if (error) throw error
              if (!data) {
                recipe.value = null
                return
              }

              recipe.value = data
              servings.value = Number(data.servings || 2)

              if (data.author_id) {
                const { data: prof } = await client
                  .from('profiles')
                  .select('display_name')
                  .eq('id', data.author_id)
                  .maybeSingle()
                recipe.value.author_name = prof?.display_name || null
              }
            } catch {
              recipe.value = null
            } finally {
              loading.value = false
            }
          }

          onMounted(load)

          const onSave = async () => {
            if (!user.value) return
            message.value = ''
            try {
              const { error } = await client.from('saved_recipes').insert({
                user_id: user.value.id,
                recipe_id: recipe.value.id
              })
              if (error) throw error
              message.value = 'Додано до збережених'
            } catch {
              message.value = 'Не вдалося зберегти рецепт'
            }
          }
          </script>
          EOF

      - name: Commit changes (if any)
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes to commit."
            exit 0
          fi
          git add -A
          git commit -m "TASK006: fix multi seasons/types rendering in cards and recipe detail page"

      - name: Push
        shell: bash
        run: |
          git push origin "HEAD:${GITHUB_REF_NAME}"

name: TASK009-IMAGE-UPLOAD-UI

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  task:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure git
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

      - name: Patch create/edit image inputs
        run: |

          patch_file() {

          FILE=$1

          sed -i 's/type="file"/type="file" class="hidden" ref="fileInput"/g' $FILE

          sed -i 's/<img/<div @click="openFilePicker" class="cursor-pointer"><img/g' $FILE
          sed -i 's/\/>/\/><\/div>/g' $FILE

          }

          patch_file pages/recipes/create.vue
          patch_file pages/recipes/[id]/edit.vue

      - name: Inject helper function
        run: |

          for FILE in pages/recipes/create.vue pages/recipes/[id]/edit.vue
          do

          sed -i '/<script setup/a\

          const fileInput = ref(null)\

          const openFilePicker = () => {\
            fileInput.value?.click()\
          }\

          ' $FILE

          done

      - name: Commit
        run: |
          git add .
          git commit -m "TASK009: custom image upload tile UI"
          git push
